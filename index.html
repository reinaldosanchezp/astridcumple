<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Cumpleaños Astrid</title>
    <style>
        /* --- ESTILOS GENERALES Y FUENTES --- */
        :root {
            /* Definición de colores exactos basados en la imagen */
            --bg-purple: #1a0b2e; /* Fondo oscuro estrellado */
            --card-purple: #f3e8ff; /* Púrpura muy claro para las tarjetas */
            --text-purple-dark: #6b21a8; /* Púrpura oscuro para títulos */
            --text-purple-medium: #8b5cf6; /* Púrpura medio para subtítulos */
            --text-gray: #4b5563; /* Gris para textos de detalles */
            --shadow-light: rgba(139, 92, 246, 0.3); /* Sombra púrpura suave */
            --whatsapp-green: #22c55e; /* Verde de confirmación */
            --whatsapp-green-hover: #16a34a; /* Verde oscuro al pasar el ratón */
        }

        /* Usamos una fuente sans-serif limpia y moderna similar a la imagen */
        body {
            font-family: 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Reemplaza esta URL por tu fondo de cielo estrellado */
            background-image: url('assets/astrid-cosmic-background.png'), linear-gradient(135deg, #2e1065, #1e3a8a);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #333;
        }


  .content { height: 1000px; background-color: white; padding: 50px; }

        /* --- CONTENEDOR PRINCIPAL DE LA TARJETA (EFECTO MÓVIL) --- */
        .phone-container {
            width: 360px; /* Ancho típico de un móvil */
            height: 1380px; /* Alto típico */
            background-color: transparent;
            border: 14px solid #f3e8ff; /* Borde estilo teléfono claro */
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden; /* Mantiene todo dentro de los bordes redondeados */
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espacio entre secciones */
        }

        /* --- SECCIÓN SUPERIOR: TÍTULO Y TEXTO --- */
        .top-card {
            background-color: rgba(243, 232, 255, 0.9); /* Un poco transparente */
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px var(--shadow-light);
        }

        .header-tag {
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 6px 20px;
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9333ea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h1.main-title {
            color: var(--text-purple-dark);
            font-size: 28px;
            margin: 0 0 20px 0;
            font-weight: 800;
        }

        .invitation-text {
            color: var(--text-gray);
            font-size: 20px;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .highlight-text {
            color: var(--text-purple-dark);
            font-weight: bold;
            font-size: 22px;
        }

        /* --- SECCIÓN CENTRAL: LA IMAGEN (KUROMI) --- */
        .image-container {
            flex-grow: 1; /* Ocupa el espacio disponible */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .character-image {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }

        /* --- SECCIÓN INFERIOR: DETALLES Y BOTÓN --- */
        .bottom-card {
            background-color: var(--card-purple);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 -5px 20px var(--shadow-light);
        }

        .section-header {
            margin-bottom: 20px;
        }

        .section-title {
            color: var(--text-purple-dark);
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }

        .section-subtitle {
            color: var(--text-purple-medium);
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 2px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* GRID DE DETALLES (Día, Hora, Lugar) */
        .details-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .detail-box {
            background-color: white;
            border-radius: 15px;
            padding: 10px 15px;
            text-align: left;
            margin-top: 10px;
            margin-bottom: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .detail-label {
            color: var(--text-purple-medium);
            text-transform: uppercase;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 3px;
            display: block;
        }

        .detail-value {
            color: var(--text-gray);
            font-size: 16px;
            font-weight: bold;
            line-height: 1.3;
        }

        /* EL BOTÓN INTERACTIVO */
        .whatsapp-button {
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 88%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            text-decoration: none; /* Para el enlace <a> */
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        /* Efectos al pasar el ratón o pulsar */
        .whatsapp-button:hover {
            background-color: var(--whatsapp-green-hover);
        }

        .whatsapp-button:active {
            transform: scale(0.98); /* Pequeño efecto de pulsación */
        }

        /* Icono de Checkmark simple (SVG) */
        .icon-check {
            width: 18px;
            height: 18px;
            fill: white;
        }

                /* Botón de control de música */
        #music-btn {
            background: var(--text-purple-dark);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="top-card">
        <button id="music-btn" onclick="playMusic()">🎵 Reproducir la música</button>
        <audio id="bg-music" autoplay loop>
            <source src="assets/astrid-birthday-song.wav" type="audio/wav">
        </audio>            
            <div class="header-tag">INVITACIÓN ESPECIAL</div>
            <h1 class="main-title">¡Hola soy Astrid!</h1>
            <p class="invitation-text">
                Quería decirte que falta poco para mi<br>
                cumpleaños número <span class="highlight-text">4</span>.<br>
                Por eso quiero invitarte a mi fiesta de cumpleaños para
                que la pasemos súper.
            </p>
        </div>

        <div class="image-container">
            <img src="assets/astrid-hero-reference.png" alt="Kuromi Fiesta" class="character-image">
        </div>

        <div class="bottom-card">
            <div class="section-header">
                <p class="section-title highlight-text">No faltes</p>
                <p class="section-subtitle highlight-text">¡Te esperamos!</p>
            </div>

            <div class="details-grid2">
                <div class="detail-box">
                    <span class="detail-label">Día</span>
                    <span class="detail-value">Sábado 25 de Abril</span>
                </div>
                <div class="detail-box">
                    <span class="detail-label">Hora</span>
                    <span class="detail-value">2:00 PM</span>
                </div>
                <div class="detail-box">
                    <span class="detail-label">Lugar</span>
                    <span class="detail-value">En mi casa</span>
                </div>
            </div>

            <a href="https://wa.me/+584142284169?text=¡Hola!%20Confirmo%20mi%20asistencia%20al%20cumpleaños%20de%20Astrid.%20🎂" 
               target="_blank" 
               class="whatsapp-button">
                <svg class="icon-check" viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
                Confirmar en WhatsApp
            </a>
        </div>

    </div>

    <script>
        function playMusic() {
            var audio = document.getElementById("bg-music");
            audio.play();
            document.getElementById("music-btn").style.display = 'none'; // Oculta el botón al iniciar
        }
    </script>
</body>
</html>
